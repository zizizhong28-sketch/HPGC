defaults:
  - default.yaml
  - model: AgentSA.yaml
  - data: kitti_ehem.yaml

train:
  type: 'kitti'
  load_ckpt: 'outputs/kitti/2025-10-14/13-05-37/ckpt/epoch=4-step=279635.ckpt' 
  load_pretrain: True
  lr: 0.0001
  lr_scheduler:
    step_size: 3
  epoch: 8

hydra:
  run:
    dir: ./outputs/kitti/${now:%Y-%m-%d}/${now:%H-%M-%S}